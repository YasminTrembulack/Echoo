server.servlet.context-path=/api/v1
spring.application.name=echoo
jwt.expirationSeconds=28800
jwt.secret=my-jwt-secret

# JDBC connection URL to the PostgreSQL database
# Format: jdbc:postgresql://host:port/database
spring.datasource.url=jdbc:postgresql://localhost:5432/echoo

# Database username/password used for authentication
spring.datasource.username=postgres
spring.datasource.password=postgres

# Specifies the Hibernate dialect (tells Hibernate how to generate SQL for PostgreSQL)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Formats SQL queries in the logs to be more readable (pretty print)
spring.jpa.properties.hibernate.format_sql=true

# Controls schema generation behavior:
# - update: updates the database schema without dropping existing data
# - create: recreates the schema every time (data loss)
# - validate: validates schema without modifying it
# - none: does nothing
spring.jpa.hibernate.ddl-auto=update

# Shows generated SQL queries in the console/logs
spring.jpa.show-sql=true
